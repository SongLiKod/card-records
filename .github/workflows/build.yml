name: Build APK

on:
  push:
    branches: [ "main", "master", "develop" ]
    paths-ignore:
      - '**.md'
      - '.gitignore'
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle and cache
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build Debug APK
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.build_type == 'debug' }}
        run: ./gradlew assembleDebug --build-cache --parallel --no-daemon

      - name: Build Release APK
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.build_type == 'release' }}
        run: ./gradlew assembleRelease --build-cache --parallel --no-daemon
        env:
          SIGNING_KEYSTORE: ${{ secrets.ANDROID_SIGNING_KEYSTORE }}
          SIGNING_KEY_ALIAS: ${{ secrets.ANDROID_SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.ANDROID_SIGNING_KEY_PASSWORD }}
          SIGNING_STORE_PASSWORD: ${{ secrets.ANDROID_SIGNING_STORE_PASSWORD }}

      - name: List APK files
        run: |
          echo "### APK Outputs" >> $GITHUB_STEP_SUMMARY
          find app/build/outputs/apk -name '*.apk' -type f 2>/dev/null | while read f; do
            size=$(stat -c%s "$f" 2>/dev/null || stat -f%z "$f" 2>/dev/null)
            echo "- $f ($(( size / 1024 )) KB)" >> $GITHUB_STEP_SUMMARY
          done || echo "- No APK found" >> $GITHUB_STEP_SUMMARY

      - name: Upload Debug APK
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.build_type == 'debug' }}
        uses: actions/upload-artifact@v4
        with:
          name: card-records-debug
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn
          retention-days: 30

      - name: Upload Release APK
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.build_type == 'release' }}
        uses: actions/upload-artifact@v4
        with:
          name: card-records-release
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: warn
          retention-days: 90

      - name: Build Summary
        run: |
          {
            echo "## Build Complete"
            echo ""
            echo "| Item | Value |"
            echo "|------|-------|"
            echo "| Commit | ${{ github.sha }} |"
            echo "| Branch | ${{ github.ref_name }} |"
            echo "| Build type | ${{ github.event_name == 'workflow_dispatch' && inputs.build_type || 'debug' }} |"
            echo "| Trigger | ${{ github.event_name }} |"
          } >> $GITHUB_STEP_SUMMARY

      - name: Cleanup
        if: always()
        run: |
          rm -f ~/.gradle/caches/modules-2/modules-2.lock
          rm -f ~/.gradle/caches/modules-2/gc.properties